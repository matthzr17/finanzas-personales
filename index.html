<div id="sync-modal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-2xl p-6 w-full max-w-lg shadow-2xl">
        <h3 class="text-xl font-black text-gray-800 mb-2 uppercase">Ajuste Manual de Caja</h3>
        <p class="text-xs text-gray-500 mb-6 italic">Escribe el saldo real que ves en tus apps o cartera. El sistema se actualizará exactamente a estos montos.</p>
        
        <div class="grid grid-cols-2 gap-4 h-[400px] overflow-y-auto pr-2">
            <div class="col-span-2 text-[10px] font-bold text-blue-600 border-b pb-1 uppercase">Cuentas y Efectivo</div>
            <div><label class="text-[9px] font-bold text-gray-400 uppercase">Santander</label><input type="number" id="sync-santander" class="w-full p-2 border rounded-lg font-bold"></div>
            <div><label class="text-[9px] font-bold text-gray-400 uppercase">Nu Débito</label><input type="number" id="sync-nu" class="w-full p-2 border rounded-lg font-bold"></div>
            <div><label class="text-[9px] font-bold text-gray-400 uppercase">Nu Ahorro</label><input type="number" id="sync-ahorro" class="w-full p-2 border rounded-lg font-bold"></div>
            <div><label class="text-[9px] font-bold text-gray-400 uppercase">Efectivo</label><input type="number" id="sync-cash" class="w-full p-2 border rounded-lg font-bold"></div>
            
            <div class="col-span-2 text-[10px] font-bold text-red-600 border-b pb-1 mt-4 uppercase">Like U (TDC)</div>
            <div><label class="text-[9px] font-bold text-gray-400 uppercase">Deuda Actual</label><input type="number" id="sync-likeu" class="w-full p-2 border border-red-100 rounded-lg font-bold text-red-600"></div>
            <div><label class="text-[9px] font-bold text-gray-400 uppercase">Nuevo Periodo</label><input type="number" id="sync-next-likeu" class="w-full p-2 border border-red-50 rounded-lg font-bold text-red-400"></div>

            <div class="col-span-2 text-[10px] font-bold text-red-600 border-b pb-1 mt-4 uppercase">AMEX (TDC)</div>
            <div><label class="text-[9px] font-bold text-gray-400 uppercase">Deuda Actual</label><input type="number" id="sync-amex" class="w-full p-2 border border-red-100 rounded-lg font-bold text-red-600"></div>
            <div><label class="text-[9px] font-bold text-gray-400 uppercase">Nuevo Periodo</label><input type="number" id="sync-next-amex" class="w-full p-2 border border-red-50 rounded-lg font-bold text-red-400"></div>
        </div>

        <div class="flex gap-3 pt-6">
            <button onclick="saveSync()" class="flex-1 bg-black text-white py-3 rounded-xl font-bold text-xs uppercase tracking-widest">Actualizar Todo</button>
            <button onclick="closeSyncModal()" class="flex-1 bg-gray-100 text-gray-400 py-3 rounded-xl font-bold text-xs uppercase">Cerrar</button>
        </div>
    </div>
</div>

<script>
    // Actualiza solo estas funciones en tu script:
    function openSyncModal() {
        document.getElementById('sync-santander').value = state.santander;
        document.getElementById('sync-nu').value = state.nu;
        document.getElementById('sync-ahorro').value = state.nuAhorro;
        document.getElementById('sync-cash').value = state.cash;
        document.getElementById('sync-likeu').value = state.debtLikeU;
        document.getElementById('sync-next-likeu').value = state.nextLikeU;
        document.getElementById('sync-amex').value = state.debtAMEX;
        document.getElementById('sync-next-amex').value = state.nextAMEX;
        document.getElementById('sync-modal').classList.remove('hidden');
    }

    function saveSync() {
        state.santander = parseFloat(document.getElementById('sync-santander').value) || 0;
        state.nu = parseFloat(document.getElementById('sync-nu').value) || 0;
        state.nuAhorro = parseFloat(document.getElementById('sync-ahorro').value) || 0;
        state.cash = parseFloat(document.getElementById('sync-cash').value) || 0;
        state.debtLikeU = parseFloat(document.getElementById('sync-likeu').value) || 0;
        state.nextLikeU = parseFloat(document.getElementById('sync-next-likeu').value) || 0;
        state.debtAMEX = parseFloat(document.getElementById('sync-amex').value) || 0;
        state.nextAMEX = parseFloat(document.getElementById('sync-next-amex').value) || 0;
        
        const { timeStr } = getCDMXInfo();
        state.transactions.push({ 
            type: 'income', 
            amount: 0, 
            concept: "Ajuste manual de saldos (Sincronización)", 
            methodLabel: "SISTEMA", 
            date: timeStr 
        });
        
        saveMemory(); 
        updateUI(); 
        closeSyncModal();
    }
</script>
